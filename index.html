<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Классификатор ЕСКД</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="chat-shell">
      <section class="chat-app">
        <header class="chat-header">
          <div class="header-main">
            <div>
              <h1>Классификатор ЕСКД</h1>
              <p class="subtitle">Ответь на несколько вопросов или выбери подходящий вариант, и система подберет подходящий децимальный номер</p>
            </div>
          </div>
        </header>

        <section id="chat" class="chat" aria-live="polite" aria-label="Диалог"></section>

        <div class="answers hidden" id="answers"></div>

        <div class="back-row hidden" id="backRow">
          <button class="btn btn-text" id="backBtn" type="button">Шаг назад</button>
        </div>

        <footer class="controls">
          <button class="btn btn-quiet" id="restartBtn" type="button">Начать заново</button>
        </footer>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
